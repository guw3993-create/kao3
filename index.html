<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 2nd Anniversary! ❤️</title>
    <!-- Tailwind CSS for modern and beautiful styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for cute cursive text -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #ffe4e6 0%, #fecdd3 100%);
        }
        .cursive {
            font-family: 'Caveat', cursive;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-4 md:p-8">

    <!-- Header Section -->
    <header class="text-center mt-4">
        <h1 class="cursive text-5xl md:text-6xl text-rose-600 font-bold drop-shadow-sm animate-bounce">
            Happy 2nd Anniversary
        </h1>
        <p class="text-rose-500 font-medium tracking-wide mt-2">บันทึกการเดินทางความรักปีที่ 2 ของเราสองคน 💕</p>
    </header>

    <!-- Main Album Container -->
    <main class="w-full max-w-2xl bg-white/80 backdrop-blur-md rounded-3xl shadow-xl border border-rose-100 p-6 my-6 flex flex-col justify-between min-h-[450px]">
        
        <!-- Pages Container (JavaScript will swap content here) -->
        <div id="album-pages" class="flex-grow flex flex-col justify-center items-center text-center">
            <!-- Page Content will be injected by JavaScript -->
        </div>

        <!-- Navigation & Pagination Controls -->
        <div class="mt-8 pt-4 border-t border-rose-100 flex items-center justify-between">
            <button id="prev-btn" onclick="prevPage()" class="px-5 py-2 bg-rose-100 hover:bg-rose-200 text-rose-700 rounded-full font-semibold transition duration-300 disabled:opacity-40 disabled:cursor-not-allowed">
                ⬅️ ก่อนหน้า
            </button>
            
            <!-- Page Indicators (Dots) -->
            <div id="dots-container" class="flex space-x-2">
                <!-- Dots will be generated dynamically -->
            </div>

            <button id="next-btn" onclick="nextPage()" class="px-5 py-2 bg-rose-500 hover:bg-rose-600 text-white rounded-full font-semibold transition duration-300 disabled:opacity-40 disabled:cursor-not-allowed">
                ถัดไป ➡️
            </button>
        </div>
    </main>

    <!-- Footer Section -->
    <footer class="text-center text-rose-400 text-sm mb-4">
        Made with ❤️ for our 2 Years Journey
    </footer>

    <!-- JavaScript for Page Management and Image Upload Preview -->
    <script>
        // กำหนดข้อมูลของแต่ละหน้า (7-8 หน้าตามที่ขอ)
        const pagesData = [
            { title: "หน้าแรก: จุดเริ่มต้นของเรา", desc: "จำวันแรกที่เราคุยกันได้ไหม? ตั้งแต่วันนั้นจนถึงวันนี้ก็ครบ 2 ปีแล้วนะ" },
            { title: "หน้าที่ 2: เดทแรกที่แสนหวาน", desc: "ที่ที่เราไปด้วยกันครั้งแรก อาหารจานแรก และรอยยิ้มแรกที่ทำให้ใจสั่น" },
            { title: "หน้าที่ 3: ทริปแรกที่น่าจดจำ", desc: "การเดินทางไปเที่ยวต่างจังหวัดด้วยกันครั้งแรก สนุกและมีความสุขมาก ๆ" },
            { title: "หน้าที่ 4: รอยยิ้มและเสียงหัวเราะ", desc: "ทุกช่วงเวลาที่ได้หัวเราะไปด้วยกันคือสิ่งที่มีค่าที่สุด" },
            { title: "หน้าที่ 5: วันธรรมดาที่ไม่ธรรมดา", desc: "ถึงจะเป็นแค่วันธรรมดาที่ได้อยู่เฉย ๆ ด้วยกัน แต่มันพิเศษเพราะมีเธอ" },
            { title: "หน้าที่ 6: ขอบคุณที่จับมือกันไว้", desc: "ขอบคุณที่คอยอยู่เคียงข้าง และจับมือกันผ่านทุก ๆ เรื่องมาตลอด" },
            { title: "หน้าที่ 7: อนาคตข้างหน้าของเรา", desc: "ปีที่ 2 ผ่านไป และพร้อมจะก้าวเข้าสู่ปีต่อ ๆ ไปด้วยกันนะ" },
            { title: "หน้าสุดท้าย: ข้อความจากใจ", desc: "รักเธอในทุก ๆ วันนะคนดี อยู่เป็นความสุขของกันและกันแบบนี้ไปนาน ๆ นะคะ ❤️" }
        ];

        let currentPage = 0;
        // Object เก็บรูปภาพที่อัปโหลดแยกตามหน้า (Key คือเลขหน้า 0, 1, 2...)
        const uploadedImages = {};

        // ฟังก์ชัน Render เนื้อหาแต่ละหน้า
        function renderPage() {
            const container = document.getElementById('album-pages');
            const data = pagesData[currentPage];
            
            // ตรวจสอบว่าหน้าจอนี้เคยอัปโหลดรูปไว้หรือยัง
            const hasImage = uploadedImages[currentPage];
            const imageHtml = hasImage 
                ? `<div class="relative w-full max-h-[250px] overflow-hidden rounded-2xl shadow-inner border-2 border-rose-200 mb-4 group">
                    <img src="${hasImage}" class="w-full h-full object-cover max-h-[250px]" alt="Memory">
                    <label class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer text-white font-semibold rounded-2xl">
                        เปลี่ยนรูปภาพ
                        <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event, ${currentPage})">
                    </label>
                   </div>`
                : `<label class="w-full h-48 border-2 border-dashed border-rose-300 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:bg-rose-50/50 transition-colors mb-4 p-4">
                    <span class="text-4xl mb-2">📸</span>
                    <span class="text-rose-500 font-medium text-sm">คลิกเพื่ออัปโหลดรูปความทรงจำ</span>
                    <span class="text-rose-300 text-xs mt-1">(หน้า ${currentPage + 1})</span>
                    <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event, ${currentPage})">
                   </label>`;

            container.innerHTML = `
                <div class="w-full flex flex-col items-center animate-fadeIn">
                    ${imageHtml}
                    <h2 class="text-xl md:text-2xl font-bold text-rose-700 mb-2">${data.title}</h2>
                    <p class="text-gray-600 text-sm md:text-base leading-relaxed px-4">${data.desc}</p>
                </div>
            `;

            updateControls();
        }

        // ฟังก์ชันจัดการตอนอัปโหลดรูปภาพ
        function handleImageUpload(event, pageIndex) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImages[pageIndex] = e.target.result; // บันทึกรูปในรูปแบบ Base64
                    renderPage(); // โหลดหน้านั้นใหม่เพื่อแสดงรูป
                }
                reader.readAsDataURL(file);
            }
        }

        // ฟังก์ชันควบคุมการเปลี่ยนหน้า
        function updateControls() {
            // ควบคุมการเปิดปิดปุ่ม
            document.getElementById('prev-btn').disabled = currentPage === 0;
            document.getElementById('next-btn').disabled = currentPage === pagesData.length - 1;

            // อัปเดตจุดบอกตำแหน่งหน้า (Dots)
            const dotsContainer = document.getElementById('dots-container');
            dotsContainer.innerHTML = '';
            pagesData.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.className = `w-2.5 h-2.5 rounded-full transition-all duration-300 ${index === currentPage ? 'bg-rose-500 w-6' : 'bg-rose-200'}`;
                dotsContainer.appendChild(dot);
            });
        }

        function nextPage() {
            if (currentPage < pagesData.length - 1) {
                currentPage++;
                renderPage();
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                renderPage();
            }
        }

        // เริ่มต้นโหลดหน้าแรกเมื่อเปิดเว็บ
        renderPage();
    </script>

    <!-- สไตล์ขยับเคลื่อนไหวเบาๆ เพิ่มความละมุน -->
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</body>
</html>
